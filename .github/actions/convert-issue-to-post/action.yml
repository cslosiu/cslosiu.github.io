name: Convert Issues to Posts
description: >
  Converts a JSON array of GitHub issues into Jekyll _posts markdown files.
  Supports ISO date prefix in titles, filters out the "publish" label.

inputs:
  issues-json:
    description: >
      JSON array of issue objects. Each object must have:
      number, title, body, createdAt (or created_at),
      labels (array of objects with a "name" field).
    required: true

runs:
  using: composite
  steps:
    - name: Generate post files
      shell: bash
      env:
        ISSUES_JSON: ${{ inputs.issues-json }}
      run: |
        mkdir -p _posts

        echo "$ISSUES_JSON" | jq -c '.[]' | while IFS= read -r issue; do
          NUMBER=$(echo "$issue" | jq -r '.number')
          TITLE=$(echo "$issue" | jq -r '.title')
          BODY=$(echo "$issue" | jq -r '.body // ""')
          CREATED_AT=$(echo "$issue" | jq -r '.createdAt // .created_at')
          LABELS_JSON=$(echo "$issue" | jq '.labels')

          # Format the issue creation date to YYYY-MM-DD
          CREATED_DATE=$(echo "$CREATED_AT" | cut -d'T' -f1)

          # If title starts with an ISO date (YYYY-MM-DD), use it as the file
          # date and trim it (plus any following spaces) from the post title
          if echo "$TITLE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}'; then
            DATE_ONLY=$(echo "$TITLE" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')
            POST_TITLE=$(echo "$TITLE" | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}[[:space:]]*//')
          else
            DATE_ONLY="$CREATED_DATE"
            POST_TITLE="$TITLE"
          fi

          # Escape double quotes in title for YAML double-quoted string
          SAFE_TITLE=$(echo "$POST_TITLE" | sed 's/"/\\"/g')

          # Build labels string, excluding "publish"
          LABELS=$(echo "$LABELS_JSON" | jq -r '[.[].name | select(. != "publish")] | join(",")')

          FILENAME="_posts/${DATE_ONLY}-${NUMBER}.md"

          {
            echo "---"
            echo "layout: post"
            echo "title: \"$SAFE_TITLE\""
            echo "date: $DATE_ONLY"
            echo "tags: [$LABELS]"
            echo "issue_number: $NUMBER"
            echo "---"
            echo ""
            printf '%s\n' "$BODY"
          } > "$FILENAME"

          echo "Created: $FILENAME"
        done
