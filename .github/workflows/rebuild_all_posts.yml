name: Rebuild All Posts from Issues

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch all published issues
        id: fetch-issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch only issues with the "publish" label
          ISSUES=$(gh issue list --state open --limit 1000 --label publish \
            --json number,title,body,createdAt,labels)
          # Write to GITHUB_OUTPUT using a delimiter to support multiline JSON
          echo "json<<ISSUES_DELIMITER" >> $GITHUB_OUTPUT
          echo "$ISSUES" >> $GITHUB_OUTPUT
          echo "ISSUES_DELIMITER" >> $GITHUB_OUTPUT

      - name: Convert issues to posts
        uses: ./.github/actions/convert-issue-to-post
        with:
          issues-json: ${{ steps.fetch-issues.outputs.json }}

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _posts/*.md
          git commit -m "docs: rebuild all posts from issues" || echo "No changes to commit"
          git push
