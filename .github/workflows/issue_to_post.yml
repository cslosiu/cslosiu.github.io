name: Convert Issue to Post

on:
  issues:
    types: [opened, edited, labeled]

jobs:
  sync_issue_to_post:
    runs-on: ubuntu-latest
    # Only process issues with the "publish" label
    if: contains(github.event.issue.labels.*.name, 'publish')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert issue to post
        uses: ./.github/actions/convert-issue-to-post
        with:
          # Wrap the single issue object into a JSON array
          issues-json: "[${{ toJson(github.event.issue) }}]"

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _posts/*.md
          git commit -m "docs: convert issue #${{ github.event.issue.number }} to Jekyll post" || echo "No changes to commit"
          git push
